name: Build Unsigned IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Allow Swift macro prebuilts
        run: defaults write com.apple.dt.Xcode IDEPackageEnablePrebuilts YES

      - name: Generate project
        run: xcodegen generate

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project RoboFace.xcodeproj -scheme RoboFace

      - name: Build app
        run: |
          xcodebuild \
            -project RoboFace.xcodeproj \
            -scheme RoboFace \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned ipa
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -print -quit)
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload RoboFace-unsigned.ipa

      - name: Upload ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: RoboFace-unsigned-ipa
          path: RoboFace-unsigned.ipa

