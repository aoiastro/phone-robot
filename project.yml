name: RoboFace
options:
  bundleIdPrefix: com.aoi
  deploymentTarget:
    iOS: 16.0
settings:
  base:
    PRODUCT_NAME: RoboFace
    PRODUCT_BUNDLE_IDENTIFIER: com.aoi.RoboFace
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
    TARGETED_DEVICE_FAMILY: 1
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    SUPPORTS_MACCATALYST: NO
packages:
  LocalLLMClient:
    url: https://github.com/tattn/LocalLLMClient.git
    branch: main
targets:
  RoboFace:
    type: application
    platform: iOS
    sources:
      - path: RoboFace/Sources
      - path: RoboFace/Resources
        buildPhase: resources
    info:
      path: RoboFace/Info.plist
      properties:
        CFBundleDisplayName: RoboFace
        CFBundleShortVersionString: 0.1.0
        CFBundleVersion: 1
        LSRequiresIPhoneOS: true
        NSMicrophoneUsageDescription: ウェイクワード検出と会話のためにマイクを使用します。
        NSSpeechRecognitionUsageDescription: オンデバイス音声認識で「ロボ」の後の発話を読み取るために使用します。
        UIRequiresFullScreen: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIViewControllerBasedStatusBarAppearance: false
        UIStatusBarHidden: true
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: RoboFace/Info.plist
    dependencies:
      - package: LocalLLMClient
        product: LocalLLMClient
      - package: LocalLLMClient
        product: LocalLLMClientLlama
      - package: LocalLLMClient
        product: LocalLLMClientMLX
schemes:
  RoboFace:
    build:
      targets:
        RoboFace: all
